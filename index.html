<!DOCTYPE html>
<html lang="pt-BR">
  <head>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Farro:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Farro', sans-serif;
        background-color: #222222;
        color: #ffffff;

  <body class="bg-[#222222] text-white overflow-x-hidden">
    <div class="relative min-h-screen w-full flex flex-col items-center justify-between overflow-hidden">
      
      <!-- Background Image with Blur and Overlay -->
      <div class="absolute inset-0 z-0">

      </div>

      <!-- Main Content Area -->
      <main class="relative z-10 flex flex-col items-center justify-center flex-grow w-full px-2 text-center">
        
        <!-- Logo Container - Transparent Background -->
        <div class="mb-4 transition-transform hover:scale-105 duration-700">
          <img 
            src="https://i.postimg.cc/vZD7jZjH/logo.png" 
            alt="aid!M Logo" 
            class="h-80"
          />
        </div>

        <div class="max-w-xl mx-auto space-y-2">
          <h1 class="text-xl font-bold tracking-tight leading-tight text-white drop-shadow-lg">
            Em breve, o maior mídia kit do Brasil.<br /> <br />
            <span class="text-[#EB2052]">Propriedade Hub 2M.</span>
          </h1>
          
          <div class="w-24 h-1 bg-[#EB2052] mx-auto rounded-full shadow-[0_0_10px_rgba(255,102,0,0.5)]"></div>
          
        </div>

      <!-- Footer -->
      <footer class="relative z-10 w-full bg-[#1a1a1a]/90 backdrop-blur-sm border-t border-white/5 py-8 mt-12">
        <div class="max-w-6xl mx-auto px-6 flex flex-col items-center justify-center text-center space-y-4">
          
          <div class="flex items-center justify-center space-x-2 text-[#EB2052]">
            <!-- ShieldCheck Icon SVG -->
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"/><path d="m9 12 2 2 4-4"/></svg>
            <span class="font-medium">aid!M</span>
          </div>
          
          <p class="text-gray-400 text-sm md:text-base">
            O outro lado da mídia.
          </p>

          <a 
            href="mailto:contato@aidim.com.br" 
            class="flex items-center space-x-2 text-gray-300 hover:text-[#EB2052] transition-colors duration-300 text-sm font-medium px-4 py-2 rounded-full hover:bg-white/5"
          >
            <!-- Mail Icon SVG -->
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
            <span>contato@aidim.com.br</span>
          </a>

          <div class="pt-4 border-t border-white/5 w-full max-w-md mx-auto">
             <p class="text-gray-500 text-xs">
              © 2026 aid!M. Todos os direitos reservados.
            </p>
          </div>
        </div>
      </footer>

    </div>
